<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Haulxify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── TOP NAV ─────────────────────────────────────────────────────────────── -->
<div id="topnav-mount" data-nav-label="My Profile"></div>
<!-- ─── MAIN ─────────────────────────────────────────────────────────────────── -->
<div class="page-wrap">
    <div class="profile-page">

        <!-- LEFT — Avatar card -->
        <div class="profile-sidebar">
            <div class="profile-avatar-card">
                <div class="profile-avatar-ring" id="profile-avatar-display">—</div>
                <div class="profile-avatar-meta">
                    <span class="profile-avatar-name" id="profile-display-name">—</span>
                    <span class="role-pill" id="profile-display-role">—</span>
                </div>
                <label class="profile-avatar-upload-btn" for="avatar-file-input">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload Photo
                </label>
                <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                <span class="profile-avatar-hint">JPG, PNG up to 5MB</span>
                <div class="profile-upload-status" id="upload-status"></div>
            </div>
        </div>

        <!-- RIGHT — Sections -->
        <div class="profile-main">

            <!-- Toast -->
            <div class="profile-toast" id="profile-toast"></div>

            <!-- Personal Info -->
            <div class="profile-section">
                <div class="profile-section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M20 20a8 8 0 1 0-16 0"/></svg>
                    <div>
                        <h2 class="profile-section-title">Personal Information</h2>
                        <p class="profile-section-sub">Your name, date of birth and contact details</p>
                    </div>
                </div>
                <div class="profile-form-grid">
                    <div class="profile-field">
                        <label class="profile-label">Full Name</label>
                        <input class="profile-input" type="text" id="field-full-name" placeholder="Your full name">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">Date of Birth</label>
                        <input class="profile-input" type="date" id="field-dob">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">Phone Number</label>
                        <input class="profile-input" type="tel" id="field-phone" placeholder="+1 (555) 000-0000">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">Email Address</label>
                        <input class="profile-input" type="email" id="field-email" placeholder="you@example.com" disabled>
                        <span class="profile-field-hint">Email cannot be changed here</span>
                    </div>
                </div>
                <div class="profile-section-footer">
                    <button class="btn btn-primary" onclick="savePersonalInfo()">Save Changes</button>
                </div>
            </div>

            <!-- Emergency Contact -->
            <div class="profile-section">
                <div class="profile-section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    <div>
                        <h2 class="profile-section-title">Emergency Contact</h2>
                        <p class="profile-section-sub">Who should we contact in case of emergency</p>
                    </div>
                </div>
                <div class="profile-form-grid">
                    <div class="profile-field">
                        <label class="profile-label">Contact Name</label>
                        <input class="profile-input" type="text" id="field-emergency-name" placeholder="Full name">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">Contact Phone</label>
                        <input class="profile-input" type="tel" id="field-emergency-phone" placeholder="+1 (555) 000-0000">
                    </div>
                </div>
                <div class="profile-section-footer">
                    <button class="btn btn-primary" onclick="saveEmergencyContact()">Save Changes</button>
                </div>
            </div>

            <!-- Change Password -->
            <div class="profile-section">
                <div class="profile-section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <div>
                        <h2 class="profile-section-title">Change Password</h2>
                        <p class="profile-section-sub">Update your password to keep your account secure</p>
                    </div>
                </div>
                <div class="profile-form-grid">
                    <div class="profile-field" style="grid-column: 1 / -1;">
                        <label class="profile-label">Current Password</label>
                        <input class="profile-input" type="password" id="field-current-password" placeholder="Enter your current password">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">New Password</label>
                        <input class="profile-input" type="password" id="field-new-password" placeholder="Min. 8 characters">
                    </div>
                    <div class="profile-field">
                        <label class="profile-label">Confirm New Password</label>
                        <input class="profile-input" type="password" id="field-confirm-password" placeholder="Repeat new password">
                    </div>
                </div>
                <div class="profile-section-footer">
                    <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="chat-popup.js"></script>
    <script src="webrtc-calls.js"></script>
<script>
(async () => {
    await loadNav();

    // mark My Profile active in dropdown
    const navProfileLink = document.querySelector('.profile-dropdown-item[href="profile.html"]');
    if (navProfileLink) navProfileLink.classList.add('profile-dropdown-item--active');

    // use checkAuth — requireAuth does not exist
    const profile = await checkAuth();
    if (!profile) return;

    // init theme — fixes sun not showing on first load
    await initTheme(profile.id);

    const { data: { session } } = await sb.auth.getSession();

    // populate sidebar avatar + name + role
    setAvatar(document.getElementById('profile-avatar-display'), profile.full_name, profile.avatar_url);
    document.getElementById('profile-display-name').textContent = profile.full_name || '—';
    const roleMeta = ROLE_META[profile.role] || { label: profile.role, color: '#6b7280' };
    const rp = document.getElementById('profile-display-role');
    if (rp) {
        rp.textContent = roleMeta.label;
        rp.style.background = roleMeta.color + '18';
        rp.style.color = roleMeta.color;
    }

    // fill form fields
    document.getElementById('field-full-name').value       = profile.full_name       || '';
    document.getElementById('field-email').value           = profile.email           || session?.user?.email || '';
    document.getElementById('field-dob').value             = profile.dob             || '';
    document.getElementById('field-phone').value           = profile.phone           || '';
    document.getElementById('field-emergency-name').value  = profile.emergency_name  || '';
    document.getElementById('field-emergency-phone').value = profile.emergency_phone || '';
})();

function showToast(msg, type = 'success') {
    const t = document.getElementById('profile-toast');
    t.textContent = msg;
    t.className = `profile-toast profile-toast--${type} profile-toast--show`;
    setTimeout(() => t.classList.remove('profile-toast--show'), 3500);
}

async function savePersonalInfo() {
    const full_name = document.getElementById('field-full-name').value.trim();
    const dob       = document.getElementById('field-dob').value;
    const phone     = document.getElementById('field-phone').value.trim();
    if (!full_name) return showToast('Full name is required', 'error');
    const { data: { session } } = await sb.auth.getSession();
    const { error } = await sb.from('profiles').update({ full_name, dob: dob || null, phone: phone || null, updated_at: new Date().toISOString() }).eq('id', session.user.id);
    if (error) return showToast('Failed to save: ' + error.message, 'error');
    document.getElementById('nav-name').textContent = full_name;
    document.getElementById('profile-display-name').textContent = full_name;
    document.getElementById('dropdown-name').textContent = full_name;
    showToast('Personal info saved successfully');
}

async function saveEmergencyContact() {
    const emergency_name  = document.getElementById('field-emergency-name').value.trim();
    const emergency_phone = document.getElementById('field-emergency-phone').value.trim();
    const { data: { session } } = await sb.auth.getSession();
    const { error } = await sb.from('profiles').update({ emergency_name: emergency_name || null, emergency_phone: emergency_phone || null, updated_at: new Date().toISOString() }).eq('id', session.user.id);
    if (error) return showToast('Failed to save: ' + error.message, 'error');
    showToast('Emergency contact saved successfully');
}

async function changePassword() {
    const currentPw = document.getElementById('field-current-password').value;
    const np        = document.getElementById('field-new-password').value;
    const cp        = document.getElementById('field-confirm-password').value;
    if (!currentPw)    return showToast('Please enter your current password', 'error');
    if (np.length < 8) return showToast('New password must be at least 8 characters', 'error');
    if (np !== cp)     return showToast('New passwords do not match', 'error');
    if (np === currentPw) return showToast('New password must be different from current', 'error');

    // Verify old password by re-authenticating
    const { data: { session } } = await sb.auth.getSession();
    const email = session?.user?.email;
    if (!email) return showToast('Session error — please reload', 'error');

    const { error: verifyErr } = await sb.auth.signInWithPassword({ email, password: currentPw });
    if (verifyErr) return showToast('Current password is incorrect', 'error');

    // Old password verified — update to new password
    const { error } = await sb.auth.updateUser({ password: np });
    if (error) return showToast('Failed: ' + error.message, 'error');

    document.getElementById('field-current-password').value = '';
    document.getElementById('field-new-password').value     = '';
    document.getElementById('field-confirm-password').value  = '';
    showToast('Password updated successfully');
}

async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) return showToast('File must be under 5MB', 'error');
    const status = document.getElementById('upload-status');
    status.textContent = 'Uploading...';
    const { data: { session } } = await sb.auth.getSession();
    const path = `${session.user.id}/avatar`;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { status.textContent = ''; return showToast('Upload failed: ' + upErr.message, 'error'); }
    const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
    const cacheBusted = publicUrl + '?t=' + Date.now();
    const { error: dbErr } = await sb.from('profiles').update({ avatar_url: cacheBusted }).eq('id', session.user.id);
    if (dbErr) { status.textContent = ''; return showToast('Saved but DB update failed', 'error'); }
    ['nav-avatar', 'dropdown-avatar', 'profile-avatar-display'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = `<img src="${cacheBusted}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;">`;
    });
    status.textContent = '';
    showToast('Profile photo updated');
}
</script>
</body>
</html>
