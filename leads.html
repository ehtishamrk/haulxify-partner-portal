<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/haulxify.webp" type="image/webp">
<title>Leads — Haulxify Partner Portal</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<!-- ─── TOP NAV ──────────────────────────────────────────────────────────── -->
<div id="topnav-mount" data-nav-label="Partner Portal"></div>

<!-- ─── MAIN ─────────────────────────────────────────────────────────────── -->
<div class="page-wrap">

    <div class="page-header">
        <div>
            <h1>Leads</h1>
            <p id="lead-count">Loading…</p>
        </div>
        <button class="btn btn-primary" id="new-lead-btn" onclick="openLeadModal()" style="display:none">
            + New Lead
        </button>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
        <div class="search-wrap">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="search" class="search-input" id="search-input"
                placeholder="Search company or owner name…" oninput="onSearch(this.value)">
        </div>
        <div class="filter-pills" id="filter-pills">
            <button class="filter-pill active" data-status="all"     onclick="setFilter('all')">All</button>
            <button class="filter-pill" data-status="New"            onclick="setFilter('New')">New</button>
            <button class="filter-pill" data-status="Contacted"      onclick="setFilter('Contacted')">Contacted</button>
            <button class="filter-pill" data-status="Qualified"      onclick="setFilter('Qualified')">Qualified</button>
            <button class="filter-pill" data-status="In Progress"    onclick="setFilter('In Progress')">In Progress</button>
            <button class="filter-pill" data-status="Hired"          onclick="setFilter('Hired')">Hired</button>
            <button class="filter-pill" data-status="Closed"         onclick="setFilter('Closed')">Closed</button>
            <button class="filter-pill" data-status="Lost"           onclick="setFilter('Lost')">Lost</button>
        </div>
    </div>

    <!-- Leads Table -->
    <div id="leads-wrap"></div>

</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LEAD FORM MODAL (Create / Edit)
══════════════════════════════════════════════════════════════════════════════ -->
<div id="lead-modal" class="modal-overlay hidden" onclick="onModalOverlayClick(event)">
<div class="modal-panel" onclick="event.stopPropagation()">
    <div class="modal-header">
        <h2 id="modal-title">New Lead</h2>
        <button class="modal-close" onclick="closeLeadModal()">✕</button>
    </div>

    <div class="modal-body" id="modal-body">

        <!-- SECTION 1: Contact Information -->
        <div class="form-section">
            <div class="form-section-title">Contact Information</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Owner Name <span class="req">*</span></label>
                    <input id="f-owner_name" class="form-control" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                    <label>Company Name <span class="req">*</span></label>
                    <input id="f-company_name" class="form-control" placeholder="Smith Freight LLC" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input id="f-phone" class="form-control" placeholder="+1 (555) 000-0000" type="tel">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input id="f-email" class="form-control" placeholder="owner@company.com" type="email">
                </div>
<div class="form-group full">
                    <label>Company Address</label>
                    <input id="f-company_address" class="form-control" placeholder="123 Freight Ave, Dallas, TX 75201">
                </div>
                <div class="form-group">
                    <label>Lead Date</label>
                    <input id="f-lead_date" class="form-control" type="date">
                </div>
            </div>
        </div>

 <!-- SECTION 2: Driver & Truck Requirements -->
        <div class="form-section">
            <div class="form-section-title">Driver & Truck Requirements</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Number of Drivers Required</label>
                    <input id="f-drivers_required" class="form-control" type="number" min="1" placeholder="e.g. 3" oninput="onDriverCountChange(this.value)">
                </div>
                <div class="form-group">
                    <label>Years of Experience Required</label>
                    <input id="f-experience_years" class="form-control" type="number" min="0" placeholder="e.g. 2">
                </div>
                <div class="form-group">
                    <label>Route Type</label>
                    <div class="radio-group">
                        <label class="radio-opt"><input type="radio" name="route_type" value="OTR"> OTR</label>
                        <label class="radio-opt"><input type="radio" name="route_type" value="Regional"> Regional</label>
                    </div>
                </div>
                <div class="form-group full">
                    <label>Specific Requirements</label>
                    <textarea id="f-specific_requirements" class="form-control"
                        placeholder="Special permits (HazMat, Tanker, TWIC), endorsements, background restrictions, etc."
                        rows="3"></textarea>
                </div>
            </div>

            <!-- Apply to All bar — hidden until count > 1 -->
            <div id="apply-all-bar" style="display:none;background:var(--c-surface-2,#1e1e32);border:1px solid var(--c-border);border-radius:10px;padding:14px 16px;margin-top:16px;">
                <div style="font-size:12px;font-weight:700;color:var(--c-text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">⚡ Apply to All Drivers</div>
                <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">License Type</div>
                        <div style="display:flex;gap:6px;">
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('license_type','CDL')">CDL</button>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('license_type','Non-CDL')">Non-CDL</button>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">CDL Class</div>
                        <div style="display:flex;gap:6px;">
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('cdl_class','A')">A</button>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('cdl_class','B')">B</button>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('cdl_class','C')">C</button>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">Transmission</div>
                        <div style="display:flex;gap:6px;">
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('transmission','Automatic')">Automatic</button>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('transmission','Manual')">Manual</button>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">ELD Installed</div>
                        <div style="display:flex;gap:6px;">
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('eld_installed','Yes')">Yes</button>
                            <button type="button" class="btn btn-ghost btn-sm" onclick="applyAll('eld_installed','No')">No</button>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">Truck Year</div>
                        <input id="apply-all-year" class="form-control" style="width:90px;height:34px;font-size:13px;" placeholder="2021" maxlength="4">
                        <button type="button" class="btn btn-ghost btn-sm" style="margin-top:4px;width:100%;" onclick="applyAll('truck_year',document.getElementById('apply-all-year').value)">Apply Year</button>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">Make</div>
                        <input id="apply-all-make" class="form-control" style="width:100px;height:34px;font-size:13px;" placeholder="Kenworth">
                        <button type="button" class="btn btn-ghost btn-sm" style="margin-top:4px;width:100%;" onclick="applyAll('truck_make',document.getElementById('apply-all-make').value)">Apply Make</button>
                    </div>
                    <div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-bottom:4px;">Model</div>
                        <input id="apply-all-model" class="form-control" style="width:100px;height:34px;font-size:13px;" placeholder="T680">
                        <button type="button" class="btn btn-ghost btn-sm" style="margin-top:4px;width:100%;" onclick="applyAll('truck_model',document.getElementById('apply-all-model').value)">Apply Model</button>
                    </div>
                </div>
            </div>

            <!-- Per-driver rows -->
            <div id="driver-rows" style="margin-top:16px;"></div>
        </div>

        <!-- SECTION 4: Compensation -->
        <div class="form-section">
            <div class="form-section-title">Compensation</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Compensation Type</label>
                    <select id="f-compensation_type" class="form-control" onchange="onCompTypeChange()">
                        <option value="">— Select type —</option>
                        <option value="Mileage Rate">Mileage Rate ($/mile)</option>
                        <option value="Hourly Rate">Hourly Rate ($/hr)</option>
                        <option value="Gross Revenue Percentage">Gross Revenue Percentage (%)</option>
                    </select>
                </div>
                <div class="form-group" id="comp-value-wrap" style="display:none">
                    <label id="comp-value-label">Rate</label>
                    <input id="f-compensation_value" class="form-control" placeholder="">
                </div>
            </div>
        </div>

        <!-- SECTION 5: Employment Terms -->
        <div class="form-section">
            <div class="form-section-title">Employment Terms</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Employment Classification</label>
                    <div class="radio-group">
                        <label class="radio-opt"><input type="radio" name="employment_classification" value="1099 Independent Contractor"> 1099 Contractor</label>
                        <label class="radio-opt"><input type="radio" name="employment_classification" value="W-2 Employee"> W-2 Employee</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Commission Per Successful Hire</label>
                    <input id="f-commission_per_hire" class="form-control" placeholder="e.g. $500 flat, 10%, etc.">
                </div>
            </div>
        </div>

    </div><!-- /modal-body -->

    <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeLeadModal()">Cancel</button>
        <button class="btn btn-primary" id="save-lead-btn" onclick="saveLead()">Save Lead</button>
    </div>
</div>
</div><!-- /lead-modal -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     LEAD DETAIL DRAWER
══════════════════════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="lead-drawer">

    <div class="drawer-header">
        <div>
            <div id="d-company" style="font-size:18px;font-weight:700;"></div>
            <div id="d-owner" style="font-size:13px;color:var(--c-text-2);margin-top:3px;"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <span id="d-status-badge"></span>
            <button class="drawer-close" onclick="closeDrawer()">✕</button>
        </div>
    </div>

    <div class="drawer-body" id="drawer-body">
        <!-- Rendered by JS -->
    </div>

</aside>

<!-- ─── SCRIPTS ───────────────────────────────────────────────────────────── -->
<script src="app.js"></script>
<script src="chat-popup.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allLeads      = [];
let activeFilter  = 'all';
let searchTerm    = '';
let editingLeadId = null;
let openLeadId    = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadNav();
    const profile = await checkAuth();
    if (!profile) return;

    // Nav
    document.getElementById('nav-name').textContent = profile.full_name;
    await initTheme(profile.id);
const rm = ROLE_META[profile.role] || { label: profile.role, color: '#6b7280' };
const rp = document.getElementById('nav-role-pill');
if (rp) {
    rp.textContent = rm.label;
    rp.style.cssText = `background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;`;
}

    // Show New Lead button only for agents/admins
    if (profile.role !== 'status_updater')
        document.getElementById('new-lead-btn').style.display = '';

    // Show Admin link for super_admin
if (profile.role === 'super_admin') {
    const ddAdmin = document.getElementById('dropdown-admin-link');
    if (ddAdmin) ddAdmin.style.display = 'flex';
}

    await loadLeads();
});

// ─── LOAD / RENDER ────────────────────────────────────────────────────────────
async function loadLeads() {
    document.getElementById('leads-wrap').innerHTML = `<div class="loading-wrap"><div class="spinner"></div> Loading leads…</div>`;
    try {
        allLeads = await fetchLeads({ status: activeFilter, search: searchTerm });
        renderLeads();
    } catch (err) {
        document.getElementById('leads-wrap').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-title">Failed to load</div><div class="empty-sub">${escHtml(err.message)}</div></div>`;
    }
}

function renderLeads() {
    const wrap = document.getElementById('leads-wrap');
    document.getElementById('lead-count').textContent = `${allLeads.length} lead${allLeads.length !== 1 ? 's' : ''}`;

    if (!allLeads.length) {
        wrap.innerHTML = `<div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">No leads yet</div>
            <div class="empty-sub">${currentProfile.role !== 'status_updater' ? 'Click "+ New Lead" to add the first one.' : 'No leads match your filter.'}</div>
        </div>`;
        return;
    }

    const canEdit   = currentProfile.role !== 'status_updater';
    const isAdmin   = currentProfile.role === 'super_admin';

    wrap.innerHTML = `
    <div class="leads-table-wrap">
    <table class="leads-table">
        <thead><tr>
            <th>Company / Owner</th>
            <th>Phone</th>
            <th>Drivers</th>
            <th>Route</th>
            <th>Status</th>
<th>Agent</th>
            <th>Lead Date</th>
            <th>Added</th>
            <th></th>
        </tr></thead>
        <tbody id="leads-tbody"></tbody>
    </table>
    </div>`;

    const tbody = document.getElementById('leads-tbody');
    tbody.innerHTML = allLeads.map(l => `
        <tr onclick="openDrawer('${l.id}')">
            <td>
                <div class="lead-company">${escHtml(l.company_name)}</div>
                <div class="lead-sub">${escHtml(l.owner_name)}</div>
            </td>
            <td class="text-muted">${escHtml(l.phone || '—')}</td>
            <td class="text-muted">${l.drivers_required || '—'}</td>
            <td class="text-muted">${escHtml(l.route_type || '—')}</td>
            <td>${statusBadge(l.status)}</td>
<td class="text-muted">${escHtml(l.agent?.full_name || '—')}</td>
            <td class="text-muted">${l.lead_date ? formatDate(l.lead_date) : '—'}</td>
            <td class="text-muted">${formatDate(l.created_at)}</td>
            <td onclick="event.stopPropagation()">
                <div class="actions-cell">
                    ${canEdit && (isAdmin || l.created_by === currentProfile.id) ? `<button class="btn btn-ghost btn-sm" onclick="openLeadModal('${l.id}')">Edit</button>` : ''}
                    ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${l.id}','${escHtml(l.company_name)}')">Del</button>` : ''}
                </div>
            </td>
        </tr>
    `).join('');
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
function setFilter(status) {
    activeFilter = status;
    document.querySelectorAll('.filter-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.status === status));
    loadLeads();
}

let searchTimer;
function onSearch(val) {
    searchTerm = val;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadLeads, 350);
}

// ─── LEAD FORM MODAL ──────────────────────────────────────────────────────────
function openLeadModal(leadId = null) {
    editingLeadId = leadId;
    document.getElementById('modal-title').textContent = leadId ? 'Edit Lead' : 'New Lead';
    clearForm();

    if (leadId) {
        const lead = allLeads.find(l => l.id === leadId);
        if (lead) populateForm(lead);
    }
    document.getElementById('lead-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeLeadModal() {
    document.getElementById('lead-modal').classList.add('hidden');
    document.body.style.overflow = '';
    editingLeadId = null;
}

function onModalOverlayClick(e) {
    if (e.target === document.getElementById('lead-modal')) closeLeadModal();
}

function clearForm() {
['owner_name','company_name','phone','email','company_address',
     'lead_date','drivers_required','experience_years','specific_requirements',
     'compensation_type','compensation_value','commission_per_hire'].forEach(id => {
        const el = document.getElementById('f-' + id);
        if (el) el.value = '';
    });
    document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
    document.getElementById('comp-value-wrap').style.display = 'none';
    // Reset images and drivers
    _pendingImages = []; _existingImages = []; _driverDetails = [];
    renderImagePreviews();
    document.getElementById('driver-rows').innerHTML = '';
    const allBar = document.getElementById('apply-all-bar');
    if (allBar) allBar.style.display = 'none';
}

function populateForm(l) {
    const set = (id, val) => { const el = document.getElementById('f-'+id); if (el && val !== null && val !== undefined) el.value = val; };
    set('owner_name', l.owner_name);
    set('company_name', l.company_name);
    set('phone', l.phone);
    set('email', l.email);
    set('company_address', l.company_address);
    set('drivers_required', l.drivers_required);
    set('experience_years', l.experience_years);
    set('specific_requirements', l.specific_requirements);
    set('commission_per_hire', l.commission_per_hire);
    if (l.lead_date) set('lead_date', l.lead_date.substring(0, 10));

    const radio = (name, val) => {
        if (val === null || val === undefined) return;
        const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
        if (el) el.checked = true;
    };
    radio('route_type', l.route_type);
    radio('employment_classification', l.employment_classification);

    // Populate existing images
    _existingImages = Array.isArray(l.truck_images) ? [...l.truck_images] : [];
    _pendingImages  = [];
    renderImagePreviews();

    // Populate driver details
    _driverDetails = Array.isArray(l.driver_details) ? l.driver_details.map(d => ({...d})) : [];
    if (_driverDetails.length) {
        const allBar = document.getElementById('apply-all-bar');
        if (allBar) allBar.style.display = _driverDetails.length > 1 ? '' : 'none';
        renderDriverRows();
    }

    if (l.compensation_type) {
        set('compensation_type', l.compensation_type);
        set('compensation_value', l.compensation_value);
        onCompTypeChange();
    }
}

function getRadio(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : null;
}

function collectForm() {
    const g = id => { const el = document.getElementById('f-'+id); return el ? (el.value.trim() || null) : null; };
    const boolRadio = name => { const v = getRadio(name); return v === 'true' ? true : v === 'false' ? false : null; };

    if (!g('owner_name') || !g('company_name')) {
        showToast('Owner name and company name are required.', 'error');
        return null;
    }

    return {
        owner_name:              g('owner_name'),
        company_name:            g('company_name'),
        phone:                   g('phone'),
        email:                   g('email'),
        company_address:         g('company_address'),
drivers_required:        g('drivers_required') ? parseInt(g('drivers_required')) : null,
        experience_years:        g('experience_years') ? parseInt(g('experience_years')) : null,
        route_type:              getRadio('route_type'),
        specific_requirements:   g('specific_requirements'),
        driver_details:          _driverDetails,
        compensation_type:       g('compensation_type') || null,
        compensation_value:      g('compensation_value'),
        employment_classification: getRadio('employment_classification'),
commission_per_hire:     g('commission_per_hire'),
        lead_date:               g('lead_date') || null,
    };
}

async function saveLead() {
    const payload = collectForm();
    if (!payload) return;

    const btn = document.getElementById('save-lead-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

try {
        let savedLead;
        if (editingLeadId) {
            savedLead = await updateLead(editingLeadId, payload);
        } else {
            savedLead = await createLead(payload);
        }
        // Upload any pending images then save URLs
        if (_pendingImages.length) {
            const newUrls = await uploadPendingImages(savedLead.id);
            const allUrls = [..._existingImages, ...newUrls];
            await sb.from('leads').update({ truck_images: allUrls }).eq('id', savedLead.id);
        } else if (editingLeadId) {
            await sb.from('leads').update({ truck_images: _existingImages }).eq('id', savedLead.id);
        }
        showToast(editingLeadId ? 'Lead updated.' : 'Lead created!', 'success');
        closeLeadModal();
        await loadLeads();
        if (openLeadId === editingLeadId) openDrawer(editingLeadId);
    } catch (err) {
        showToast('Save failed: ' + err.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Save Lead';
    }
}

// ─── TRUCK IMAGE UPLOAD ───────────────────────────────────────────────────────

let _pendingImages   = []; // { file, previewUrl } — new uploads not yet saved
let _existingImages  = []; // URLs already saved in DB

function onImageSelect(files) {
    Array.from(files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) { showToast(`${file.name} exceeds 5MB`, 'error'); return; }
        _pendingImages.push({ file, previewUrl: URL.createObjectURL(file) });
    });
    renderImagePreviews();
    document.getElementById('truck-image-input').value = '';
}

function onImageDrop(e) {
    e.preventDefault();
    document.getElementById('truck-image-upload-area').style.borderColor = 'var(--c-border)';
    onImageSelect(e.dataTransfer.files);
}

function removeExistingImage(idx) {
    _existingImages.splice(idx, 1);
    renderImagePreviews();
}

function removePendingImage(idx) {
    URL.revokeObjectURL(_pendingImages[idx].previewUrl);
    _pendingImages.splice(idx, 1);
    renderImagePreviews();
}

function renderImagePreviews() {
    const wrap = document.getElementById('truck-image-preview');
    if (!wrap) return;
    wrap.innerHTML = [
        ..._existingImages.map((url, i) => `
            <div style="position:relative;width:90px;height:90px;">
                <img src="${url}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--c-border);">
                <button onclick="removeExistingImage(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:20px;text-align:center;padding:0;">✕</button>
            </div>`),
        ..._pendingImages.map((img, i) => `
            <div style="position:relative;width:90px;height:90px;">
                <img src="${img.previewUrl}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--c-border);opacity:.85;">
                <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:9px;text-align:center;border-radius:0 0 8px 8px;padding:2px;">uploading…</div>
                <button onclick="removePendingImage(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:20px;text-align:center;padding:0;">✕</button>
            </div>`)
    ].join('') || '<span style="font-size:12px;color:var(--c-text-3);">No images added yet.</span>';
}

async function uploadPendingImages(leadId) {
    const uploaded = [];
    for (const img of _pendingImages) {
        const ext  = img.file.name.split('.').pop();
        const path = `${leadId}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
        const { error } = await sb.storage.from('truck-images').upload(path, img.file);
        if (error) { showToast(`Upload failed: ${img.file.name}`, 'error'); continue; }
        const { data: { publicUrl } } = sb.storage.from('truck-images').getPublicUrl(path);
        uploaded.push(publicUrl);
    }
    _pendingImages = [];
    return uploaded;
}

// ─── DRIVER & TRUCK REQUIREMENT ROWS ─────────────────────────────────────────

let _driverDetails = [];
// each item: { license_type, cdl_class, truck_year, truck_make, truck_model, transmission, eld_installed }

function onDriverCountChange(val) {
    const n = parseInt(val) || 0;
    const allBar = document.getElementById('apply-all-bar');

    if (n < 1) {
        _driverDetails = [];
        document.getElementById('driver-rows').innerHTML = '';
        if (allBar) allBar.style.display = 'none';
        return;
    }

    while (_driverDetails.length < n)
        _driverDetails.push({ license_type:'', cdl_class:'', truck_year:'', truck_make:'', truck_model:'', transmission:'', eld_installed:'' });
    _driverDetails = _driverDetails.slice(0, n);

    if (allBar) allBar.style.display = n > 1 ? '' : 'none';
    renderDriverRows();
}

function applyAll(field, value) {
    if (!value) return;
    _driverDetails.forEach(d => d[field] = value);
    renderDriverRows();
}

function renderDriverRows() {
    const wrap = document.getElementById('driver-rows');
    if (!wrap) return;

    wrap.innerHTML = _driverDetails.map((d, i) => `
        <div style="border:1px solid var(--c-border);border-radius:12px;padding:18px;margin-bottom:14px;background:var(--c-surface-2,#1a1a2e08);">
            <div style="font-size:13px;font-weight:700;color:var(--c-primary,#6366f1);margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                <span style="background:var(--c-primary,#6366f1);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;">${i+1}</span>
                Driver ${i+1} Requirements
            </div>
            <div class="form-grid">

                <div class="form-group">
                    <label>License Type Required</label>
                    <div class="radio-group">
                        <label class="radio-opt">
                            <input type="radio" name="dr_license_${i}" value="CDL" ${d.license_type==='CDL'?'checked':''}
                                onchange="_driverDetails[${i}].license_type=this.value; _driverDetails[${i}].cdl_class=''; renderDriverRows()"> CDL
                        </label>
                        <label class="radio-opt">
                            <input type="radio" name="dr_license_${i}" value="Non-CDL" ${d.license_type==='Non-CDL'?'checked':''}
                                onchange="_driverDetails[${i}].license_type=this.value; _driverDetails[${i}].cdl_class=''; renderDriverRows()"> Non-CDL
                        </label>
                    </div>
                </div>

                ${d.license_type === 'CDL' ? `
                <div class="form-group">
                    <label>CDL Class</label>
                    <div class="radio-group">
                        <label class="radio-opt"><input type="radio" name="dr_cdl_${i}" value="A" ${d.cdl_class==='A'?'checked':''} onchange="_driverDetails[${i}].cdl_class=this.value"> Class A</label>
                        <label class="radio-opt"><input type="radio" name="dr_cdl_${i}" value="B" ${d.cdl_class==='B'?'checked':''} onchange="_driverDetails[${i}].cdl_class=this.value"> Class B</label>
                        <label class="radio-opt"><input type="radio" name="dr_cdl_${i}" value="C" ${d.cdl_class==='C'?'checked':''} onchange="_driverDetails[${i}].cdl_class=this.value"> Class C</label>
                    </div>
                </div>` : '<div class="form-group"></div>'}

                <div class="form-group">
                    <label>Truck Year</label>
                    <input class="form-control" placeholder="e.g. 2021" maxlength="4" value="${escHtml(d.truck_year)}"
                        oninput="_driverDetails[${i}].truck_year=this.value">
                </div>

                <div class="form-group">
                    <label>Make</label>
                    <input class="form-control" placeholder="e.g. Kenworth" value="${escHtml(d.truck_make)}"
                        oninput="_driverDetails[${i}].truck_make=this.value">
                </div>

                <div class="form-group">
                    <label>Model</label>
                    <input class="form-control" placeholder="e.g. T680" value="${escHtml(d.truck_model)}"
                        oninput="_driverDetails[${i}].truck_model=this.value">
                </div>

                <div class="form-group">
                    <label>Transmission</label>
                    <select class="form-control" onchange="_driverDetails[${i}].transmission=this.value">
                        <option value="">— Select —</option>
                        <option value="Automatic" ${d.transmission==='Automatic'?'selected':''}>Automatic</option>
                        <option value="Manual" ${d.transmission==='Manual'?'selected':''}>Manual</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ELD Installed?</label>
                    <div class="radio-group">
                        <label class="radio-opt"><input type="radio" name="dr_eld_${i}" value="Yes" ${d.eld_installed==='Yes'?'checked':''} onchange="_driverDetails[${i}].eld_installed=this.value"> Yes</label>
                        <label class="radio-opt"><input type="radio" name="dr_eld_${i}" value="No"  ${d.eld_installed==='No'?'checked':''}  onchange="_driverDetails[${i}].eld_installed=this.value"> No</label>
                    </div>
                </div>

            </div>
        </div>
    `).join('');
}
    
const COMP_LABELS = {
    'Mileage Rate': { label: 'Rate ($/mile)', placeholder: 'e.g. 0.55' },
    'Hourly Rate':  { label: 'Rate ($/hr)',   placeholder: 'e.g. 22.50' },
    'Gross Revenue Percentage': { label: 'Percentage (%)', placeholder: 'e.g. 28' },
};
function onCompTypeChange() {
    const val = document.getElementById('f-compensation_type').value;
    const wrap = document.getElementById('comp-value-wrap');
    if (!val) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    const cfg = COMP_LABELS[val] || { label: 'Value', placeholder: '' };
    document.getElementById('comp-value-label').textContent = cfg.label;
    document.getElementById('f-compensation_value').placeholder = cfg.placeholder;
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
async function confirmDelete(id, name) {
    if (!confirm(`Delete lead for "${name}"? This cannot be undone.`)) return;
    try {
        await deleteLead(id);
        showToast('Lead deleted.', 'success');
        if (openLeadId === id) closeDrawer();
        await loadLeads();
    } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
    }
}

// ─── DETAIL DRAWER ────────────────────────────────────────────────────────────
async function openDrawer(leadId) {
    openLeadId = leadId;
    document.getElementById('drawer-overlay').classList.add('open');
    document.getElementById('lead-drawer').classList.add('open');
    document.body.style.overflow = 'hidden';

    document.getElementById('drawer-body').innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;
    document.getElementById('d-company').textContent = '…';
    document.getElementById('d-owner').textContent = '';
    document.getElementById('d-status-badge').innerHTML = '';

    try {
        const [lead, activities] = await Promise.all([
            fetchLead(leadId),
            fetchActivities(leadId)
        ]);
        renderDrawer(lead, activities);
    } catch (err) {
        document.getElementById('drawer-body').innerHTML = `<div class="drawer-section"><p style="color:var(--c-danger)">Failed to load: ${escHtml(err.message)}</p></div>`;
    }
}

function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('lead-drawer').classList.remove('open');
    document.body.style.overflow = '';
    openLeadId = null;
}

function renderDrawer(lead, activities) {
    document.getElementById('d-company').textContent = lead.company_name;
    document.getElementById('d-owner').textContent   = lead.owner_name;
    document.getElementById('d-status-badge').innerHTML = statusBadge(lead.status);

    const val = v => v !== null && v !== undefined && v !== '' ? escHtml(String(v)) : '<span style="color:var(--c-text-3)">—</span>';
    const bool = v => v === true ? 'Yes' : v === false ? 'No' : '—';

    const canEditThis = currentProfile.role === 'super_admin' ||
        (currentProfile.role === 'sales_agent' && lead.created_by === currentProfile.id);

    document.getElementById('drawer-body').innerHTML = `

    <!-- Contact -->
    <div class="drawer-section">
        <div class="section-label">Contact Information</div>
        <div class="detail-grid">
            <div class="detail-item"><div class="di-label">Owner</div><div class="di-value">${val(lead.owner_name)}</div></div>
            <div class="detail-item"><div class="di-label">Company</div><div class="di-value">${val(lead.company_name)}</div></div>
            <div class="detail-item"><div class="di-label">Phone</div><div class="di-value">${val(lead.phone)}</div></div>
            <div class="detail-item"><div class="di-label">Email</div><div class="di-value">${val(lead.email)}</div></div>
            <div class="detail-item full"><div class="di-label">Address</div><div class="di-value">${val(lead.company_address)}</div></div>
        </div>
    </div>

    <!-- Driver Requirements -->
    <div class="drawer-section">
        <div class="section-label">Driver Requirements</div>
        <div class="detail-grid">
            <div class="detail-item"><div class="di-label">Drivers Needed</div><div class="di-value">${val(lead.drivers_required)}</div></div>
            <div class="detail-item"><div class="di-label">Experience (yrs)</div><div class="di-value">${val(lead.experience_years)}</div></div>
            <div class="detail-item"><div class="di-label">License Type</div><div class="di-value">${val(lead.license_type)}${lead.cdl_class ? ` — Class ${lead.cdl_class}` : ''}</div></div>
            <div class="detail-item"><div class="di-label">Route Type</div><div class="di-value">${val(lead.route_type)}</div></div>
            <div class="detail-item full"><div class="di-label">Specific Requirements</div><div class="di-value">${val(lead.specific_requirements)}</div></div>
        </div>
    </div>

${Array.isArray(lead.driver_details) && lead.driver_details.length ? `
    <div class="drawer-section">
        <div class="section-label">Driver & Truck Requirements</div>
        ${lead.driver_details.map((d, i) => `
            <div style="border:1px solid var(--c-border);border-radius:10px;padding:14px;margin-bottom:10px;">
                <div style="font-size:12px;font-weight:700;color:var(--c-primary,#6366f1);margin-bottom:10px;">Driver ${i+1}</div>
                <div class="detail-grid">
                    <div class="detail-item"><div class="di-label">License Required</div><div class="di-value">${val(d.license_type)}${d.cdl_class ? ` — Class ${d.cdl_class}` : ''}</div></div>
                    <div class="detail-item"><div class="di-label">Truck Year</div><div class="di-value">${val(d.truck_year)}</div></div>
                    <div class="detail-item"><div class="di-label">Make</div><div class="di-value">${val(d.truck_make)}</div></div>
                    <div class="detail-item"><div class="di-label">Model</div><div class="di-value">${val(d.truck_model)}</div></div>
                    <div class="detail-item"><div class="di-label">Transmission</div><div class="di-value">${val(d.transmission)}</div></div>
                    <div class="detail-item"><div class="di-label">ELD Installed</div><div class="di-value">${val(d.eld_installed)}</div></div>
                </div>
            </div>`).join('')}
        ${Array.isArray(lead.truck_images) && lead.truck_images.length ? `
            <div style="margin-top:14px;">
                <div class="di-label" style="margin-bottom:8px;">Truck Pictures</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;">
                    ${lead.truck_images.map(url => `<a href="${url}" target="_blank" rel="noopener"><img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--c-border);"></a>`).join('')}
                </div>
            </div>` : ''}
    </div>` : ''}

    <!-- Compensation & Employment -->
    <div class="drawer-section">
        <div class="section-label">Compensation & Terms</div>
        <div class="detail-grid">
            <div class="detail-item"><div class="di-label">Compensation Type</div><div class="di-value">${val(lead.compensation_type)}</div></div>
            <div class="detail-item"><div class="di-label">Rate / Value</div><div class="di-value">${val(lead.compensation_value)}</div></div>
            <div class="detail-item"><div class="di-label">Employment</div><div class="di-value">${val(lead.employment_classification)}</div></div>
            <div class="detail-item"><div class="di-label">Commission/Hire</div><div class="di-value">${val(lead.commission_per_hire)}</div></div>
        </div>
    </div>

    <!-- Status Update -->
    <div class="drawer-section">
        <div class="section-label">Update Status</div>
        <div class="status-strip" id="status-strip">
            ${['New','Contacted','Qualified','In Progress','Hired','Closed','Lost'].map(s => {
                const m = STATUS_META[s];
                return `<button class="status-opt ${s === lead.status ? 'active' : ''}"
                    style="color:${m.color};border-color:${s === lead.status ? m.color : 'var(--c-border)'};"
                    onclick="setLeadStatus('${lead.id}','${s}')">${s}</button>`;
            }).join('')}
        </div>
        <div style="margin-top:14px;">
            <textarea id="drawer-comment" class="form-control" rows="2"
                placeholder="Add a comment (optional)…"></textarea>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="submitComment('${lead.id}')">
                Add Comment
            </button>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="drawer-section" style="display:flex;gap:10px;flex-wrap:wrap;">
        ${canEditThis ? `<button class="btn btn-secondary" onclick="closeDrawer();openLeadModal('${lead.id}')">Edit Lead Details</button>` : ''}
        ${currentProfile.role === 'super_admin' ? `<button class="btn btn-danger" onclick="confirmDelete('${lead.id}','${escHtml(lead.company_name)}')">Delete Lead</button>` : ''}
    </div>

    <!-- Activity Log -->
    <div class="drawer-section">
        <div class="section-label">Activity Log</div>
        <div class="activity-feed">
            ${activities.length ? activities.map(a => renderActivity(a)).join('') :
              '<p style="color:var(--c-text-3);font-size:13px;">No activity yet.</p>'}
        </div>
    </div>

    <div style="padding:8px;"></div>
    `;
}

function renderActivity(a) {
    const typeColor = {
        created:        '#10b981',
        edited:         '#6366f1',
        status_changed: '#f59e0b',
        commented:      '#06b6d4',
    }[a.action_type] || '#6b7280';

    let text = '';
    if (a.action_type === 'created')        text = `<strong>${escHtml(a.user?.full_name||'Someone')}</strong> created this lead`;
    else if (a.action_type === 'edited')    text = `<strong>${escHtml(a.user?.full_name||'Someone')}</strong> edited lead details`;
    else if (a.action_type === 'status_changed') text = `<strong>${escHtml(a.user?.full_name||'Someone')}</strong> changed status: ${statusBadge(a.old_status||'?')} → ${statusBadge(a.new_status||'?')}`;
    else if (a.action_type === 'commented') text = `<strong>${escHtml(a.user?.full_name||'Someone')}</strong> left a comment`;

    return `<div class="activity-item">
        <div class="activity-dot" style="background:${typeColor};"></div>
        <div class="activity-body">
            <div style="font-size:13px;color:var(--c-text);">${text}</div>
            ${a.comment ? `<div class="activity-comment">${escHtml(a.comment)}</div>` : ''}
            <div class="activity-meta">${formatDateTime(a.created_at)}</div>
        </div>
    </div>`;
}

async function setLeadStatus(leadId, newStatus) {
    try {
        const comment = document.getElementById('drawer-comment')?.value?.trim() || null;
        await statusUpdateRpc(leadId, newStatus, comment);
        if (document.getElementById('drawer-comment')) document.getElementById('drawer-comment').value = '';
        showToast(`Status set to "${newStatus}".`, 'success');
        await loadLeads();
        openDrawer(leadId);
    } catch (err) {
        showToast('Update failed: ' + err.message, 'error');
    }
}

async function submitComment(leadId) {
    const comment = document.getElementById('drawer-comment')?.value?.trim();
    if (!comment) { showToast('Please write a comment first.', 'warning'); return; }
    const lead = allLeads.find(l => l.id === leadId);
    await setLeadStatus(leadId, lead?.status || 'New');
}
</script>
