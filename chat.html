<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/haulxify.webp" type="image/webp">
<title>Chat — Haulxify Partner Portal</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="chat-styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>
<div id="topnav-mount" data-nav-label="Chat"></div>

<div class="chat-root">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="chat-sidebar">
        <div class="sidebar-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chat
            <button onclick="showCreateGroupModal()" title="Create group" style="margin-left:auto;background:none;border:1px solid var(--c-border);border-radius:7px;color:var(--c-text-2);cursor:pointer;padding:6px 8px;font-size:12px;display:flex;align-items:center;gap:6px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Group
            </button>
        </div>
        <div class="sidebar-search">
            <input type="search" id="sidebar-search" placeholder="Search conversations…" oninput="filterSidebar(this.value)">
        </div>
        <div class="sidebar-list" id="sidebar-list">
            <div class="sidebar-section-label">Loading…</div>
        </div>
    </aside>

    <!-- ── Main ────────────────────────────────────────────────────────── -->
    <div class="chat-main" id="chat-main">
        <div class="chat-empty" id="chat-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Select a conversation to start chatting</p>
        </div>
    </div>

</div>

    <!-- Create Group Modal -->
<div id="create-group-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.5);align-items:center;justify-content:center;backdrop-filter:blur(3px);" onclick="if(event.target===this) closeCreateGroupModal();">
    <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:16px;width:420px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);">
        <div style="padding:18px 20px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;">
            <h3 style="font-size:15px;font-weight:600;color:var(--c-text);margin:0;">Create Group Chat</h3>
            <button onclick="closeCreateGroupModal()" style="background:none;border:none;cursor:pointer;color:var(--c-text-3);font-size:20px;line-height:1;">✕</button>
        </div>
        <div style="padding:20px;overflow-y:auto;flex:1;">
            <div style="margin-bottom:16px;">
                <label style="font-size:12px;font-weight:600;color:var(--c-text-2);display:block;margin-bottom:6px;">Group Name</label>
                <input id="group-name-input" class="form-control" placeholder="e.g. Sales Team, Dispatchers…" style="width:100%;">
            </div>
            <div>
                <label style="font-size:12px;font-weight:600;color:var(--c-text-2);display:block;margin-bottom:6px;">Add Members</label>
                <input id="group-member-search" class="form-control" placeholder="Search people…" oninput="filterGroupMembers(this.value)" style="width:100%;margin-bottom:10px;">
                <div id="group-selected-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:24px;"></div>
                <div id="group-member-list" style="display:flex;flex-direction:column;gap:2px;"></div>
            </div>
        </div>
        <div style="padding:14px 20px;border-top:1px solid var(--c-border);display:flex;gap:10px;justify-content:flex-end;">
            <button class="btn btn-ghost" onclick="closeCreateGroupModal()">Cancel</button>
            <button class="btn btn-primary" onclick="createGroup()" id="create-group-btn">Create Group</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.csv,.txt" multiple onchange="onFileSelect(this.files)">

<script src="app.js"></script>
<script src="chat-popup.js"></script>
<script>
// ─── State ──────────────────────────────────────────────────────────
let allConversations  = [];
    let myWritePerms = {};
let allProfiles       = [];
let activeConvId      = null;
let messageChannel    = null;
let pendingFiles      = [];
let typingTimer       = null;
let onlineUsers       = new Set();
let unreadCounts      = {};
let permsChannel      = null;

// ─── INIT ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadNav();
    const profile = await checkAuth();
    if (!profile) return;
    currentProfile = profile;

    document.getElementById('nav-name').textContent = profile.full_name;
    const rm = ROLE_META[profile.role] || { label: profile.role, color: '#6b7280' };
    const rp = document.getElementById('nav-role-pill');
    if (rp) { rp.textContent = rm.label; rp.style.cssText = `background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;`; }
    if (profile.role === 'super_admin') { const a = document.getElementById('dropdown-admin-link'); if (a) a.style.display = 'flex'; }

    await initTheme(profile.id);  // ← ADD THIS LINE

    await Promise.all([loadProfiles(), loadConversations()]);
    renderSidebar();
    subscribePresence();
    subscribeGlobalInbox();

    // Auto-open first conversation
    if (allConversations.length) openConversation(allConversations[0].id);
});

/* Rest of chat.html JS remains unchanged (functions below are unchanged) */

</script>
</body>
</html>
