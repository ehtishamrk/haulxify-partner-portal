<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/haulxify.webp" type="image/webp">
<title>Chat — Haulxify Partner Portal</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
/* ── Chat Layout ─────────────────────────────────────────────────────────── */
.chat-root {
    display: flex;
    height: calc(100vh - 56px);
    overflow: hidden;
    background: var(--c-page);
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.chat-sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--c-surface);
    border-right: 1px solid var(--c-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--c-border);
    font-size: 14px;
    font-weight: 700;
    color: var(--c-text);
    display: flex;
    align-items: center;
    gap: 8px;
}
.sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--c-border);
}
.sidebar-search input {
    width: 100%;
    background: var(--c-raised);
    border: 1px solid var(--c-border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--c-text);
    outline: none;
}
.sidebar-search input::placeholder { color: var(--c-text-3); }
.sidebar-section-label {
    padding: 12px 14px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--c-text-3);
}
.sidebar-list { overflow-y: auto; flex: 1; }
.conv-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 8px;
    margin: 0 6px 2px;
    transition: background .15s;
    position: relative;
}
.conv-item:hover { background: var(--c-hover); }
.conv-item.active { background: var(--c-accent-g); }
.conv-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--c-raised);
    border: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    color: var(--c-text-2);
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
}
.conv-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.online-dot {
    position: absolute;
    bottom: 0; right: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--c-success);
    border: 2px solid var(--c-surface);
}
.conv-info { flex: 1; min-width: 0; }
.conv-name {
    font-size: 13px; font-weight: 500;
    color: var(--c-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.conv-preview {
    font-size: 11px; color: var(--c-text-3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
}
.unread-badge {
    background: var(--c-accent);
    color: #fff;
    font-size: 10px; font-weight: 700;
    border-radius: 10px;
    padding: 1px 6px;
    min-width: 18px;
    text-align: center;
    flex-shrink: 0;
}

/* ── Main Chat Area ──────────────────────────────────────────────────────── */
.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--c-page);
}
.chat-topbar {
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}
.chat-topbar-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--c-raised);
    border: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--c-text-2);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
}
.chat-topbar-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.chat-topbar-info { flex: 1; }
.chat-topbar-name { font-size: 14px; font-weight: 600; color: var(--c-text); }
.chat-topbar-sub  { font-size: 11px; color: var(--c-text-3); margin-top: 1px; }

/* ── Messages ────────────────────────────────────────────────────────────── */
.messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.day-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0 10px;
    color: var(--c-text-3);
    font-size: 11px;
}
.day-divider::before, .day-divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--c-border);
}
.msg-row {
    display: flex;
    gap: 8px;
    padding: 2px 0;
    align-items: flex-end;
}
.msg-row.mine { flex-direction: row-reverse; }
.msg-row.continuation .msg-avatar { visibility: hidden; }
.msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--c-raised);
    border: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    color: var(--c-text-2);
    flex-shrink: 0;
    overflow: hidden;
}
.msg-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.msg-content { max-width: 68%; display: flex; flex-direction: column; gap: 2px; }
.msg-row.mine .msg-content { align-items: flex-end; }
.msg-sender {
    font-size: 11px; color: var(--c-text-3);
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 2px; margin-left: 2px;
}
.msg-row.mine .msg-sender { display: none; }
.role-pill-sm {
    font-size: 9px; font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    letter-spacing: .02em;
}
.bubble {
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--c-text);
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    word-break: break-word;
    max-width: 100%;
}
.msg-row.mine .bubble {
    background: var(--c-accent);
    color: #fff;
    border-color: var(--c-accent);
}
.msg-row:not(.continuation) .bubble { border-radius: 16px 16px 16px 4px; }
.msg-row.mine:not(.continuation) .bubble { border-radius: 16px 16px 4px 16px; }
.bubble-time {
    font-size: 10px;
    color: var(--c-text-3);
    margin: 0 4px;
    white-space: nowrap;
    align-self: flex-end;
}
.msg-row.mine .bubble-time { color: rgba(255,255,255,.7); }

/* File/Image in bubble */
.bubble-img {
    max-width: 240px; max-height: 200px;
    border-radius: 10px; display: block;
    cursor: pointer;
    object-fit: cover;
    margin: -2px -4px;
}
.bubble-file {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    background: rgba(0,0,0,.08);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
}
.msg-row.mine .bubble-file { background: rgba(255,255,255,.18); color: #fff; }
.bubble-file-name { font-size: 12px; font-weight: 500; }
.bubble-file-size { font-size: 10px; opacity: .7; }

/* ── Input Area ──────────────────────────────────────────────────────────── */
.chat-input-area {
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    padding: 12px 16px;
    flex-shrink: 0;
}
.upload-preview-strip {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
}
.upload-thumb {
    position: relative; width: 56px; height: 56px;
}
.upload-thumb img {
    width: 56px; height: 56px;
    object-fit: cover; border-radius: 8px;
    border: 1px solid var(--c-border);
}
.upload-thumb-file {
    width: 56px; height: 56px;
    border-radius: 8px;
    border: 1px solid var(--c-border);
    background: var(--c-raised);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 9px; color: var(--c-text-3);
    text-align: center; padding: 4px;
    overflow: hidden;
}
.upload-thumb-remove {
    position: absolute; top: -5px; right: -5px;
    width: 18px; height: 18px;
    border-radius: 50%; background: var(--c-danger);
    color: #fff; border: none; cursor: pointer;
    font-size: 10px; line-height: 18px; text-align: center; padding: 0;
}
.input-row {
    display: flex; align-items: flex-end; gap: 8px;
}
.input-row textarea {
    flex: 1;
    background: var(--c-raised);
    border: 1px solid var(--c-border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--c-text);
    font-family: var(--font);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .2s;
}
.input-row textarea:focus { border-color: var(--c-accent); }
.input-row textarea::placeholder { color: var(--c-text-3); }
.input-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: none;
    border: 1px solid var(--c-border);
    color: var(--c-text-2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    flex-shrink: 0;
}
.input-btn:hover { background: var(--c-hover); color: var(--c-text); }
.input-btn.send {
    background: var(--c-accent);
    border-color: var(--c-accent);
    color: #fff;
}
.input-btn.send:hover { background: var(--c-accent-d); }
.input-btn.send:disabled { opacity: .4; cursor: default; }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.chat-empty {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--c-text-3);
    gap: 10px;
}
.chat-empty svg { opacity: .25; }
.chat-empty p { font-size: 13px; }

/* ── Image lightbox ──────────────────────────────────────────────────────── */
.lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    cursor: zoom-out;
}
.lightbox img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 8px;
    object-fit: contain;
}

/* ── Typing indicator ────────────────────────────────────────────────────── */
.typing-indicator {
    display: flex; gap: 4px;
    padding: 8px 12px;
    align-items: center;
}
.typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c-text-3);
    animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
}

/* ── Context menu ────────────────────────────────────────────────────────── */
.ctx-menu {
    position: fixed; z-index: 9000;
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    min-width: 150px;
}
.ctx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    font-size: 13px; color: var(--c-text);
    cursor: pointer; border-radius: 7px;
    transition: background .12s;
}
.ctx-item:hover { background: var(--c-hover); }
.ctx-item.danger { color: var(--c-danger); }
.ctx-item.danger:hover { background: rgba(239,68,68,.1); }
.msg-deleted {
    font-size: 12px; color: var(--c-text-3);
    font-style: italic;
    display: flex; align-items: center; gap: 5px;
}

/* ── Call modal ──────────────────────────────────────────────────────────── */
.call-overlay {
    position: fixed; inset: 0; z-index: 9500;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
}
.call-modal {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.call-avatar-ring {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--c-accent-g);
    border: 3px solid var(--c-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700;
    color: var(--c-accent);
    margin: 0 auto 16px;
    position: relative;
    animation: callPulse 2s infinite;
}
.call-avatar-ring img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
@keyframes callPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,.4); }
    50%      { box-shadow: 0 0 0 14px rgba(99,102,241,.0); }
}
.call-name { font-size: 18px; font-weight: 600; color: var(--c-text); margin-bottom: 4px; }
.call-status { font-size: 13px; color: var(--c-text-3); margin-bottom: 32px; }
.call-buttons { display: flex; justify-content: center; gap: 20px; }
.call-btn {
    width: 58px; height: 58px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s;
    flex-direction: column; gap: 3px;
}
.call-btn:hover { transform: scale(1.08); }
.call-btn-label { font-size: 10px; color: var(--c-text-3); margin-top: 6px; }
.call-btn.accept { background: #22c55e; color: #fff; box-shadow: 0 4px 14px rgba(34,197,94,.3); }
.call-btn.end    { background: #ef4444; color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,.3); }
.call-btn.mute   { background: var(--c-raised); color: var(--c-text); border: 1px solid var(--c-border); }
.call-btn.mute.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
.call-timer { font-size: 22px; font-weight: 600; color: var(--c-text); margin-bottom: 28px; font-variant-numeric: tabular-nums; }

/* ── Call button in topbar ───────────────────────────────────────────────── */
.call-topbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid var(--c-border);
    background: none;
    color: var(--c-text-2);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
}
.call-topbar-btn:hover { background: #22c55e18; color: #22c55e; border-color: #22c55e55; }
.call-topbar-btn.active { background: #22c55e; color: #fff; border-color: #22c55e; }


/* ── Create Group Modal ──────────────────────────────────────────────────── */
.modal-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
}
.modal-box {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 16px;
    width: 420px; max-width: 95vw;
    max-height: 85vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 15px; font-weight: 600; color: var(--c-text); margin: 0; }
.modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--c-text-3); padding: 4px; border-radius: 6px;
    display: flex; align-items: center;
    transition: color .15s;
}
.modal-close:hover { color: var(--c-text); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--c-border);
    display: flex; gap: 10px; justify-content: flex-end;
}
.member-pick-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
.member-pick-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    transition: background .12s;
}
.member-pick-item:hover { background: var(--c-hover); }
.member-pick-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--c-accent); cursor: pointer; flex-shrink: 0; }
.member-pick-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--c-raised); border: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--c-text-2);
    flex-shrink: 0; overflow: hidden;
}
.member-pick-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.member-pick-name { font-size: 13px; color: var(--c-text); flex: 1; }
.member-pick-role { font-size: 11px; color: var(--c-text-3); }
.selected-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 28px; }
.selected-chip {
    background: var(--c-accent-g); color: var(--c-accent);
    border: 1px solid var(--c-accent)44;
    border-radius: 20px; padding: 3px 10px;
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 5px;
}
.selected-chip button { background: none; border: none; cursor: pointer; color: var(--c-accent); font-size: 13px; padding: 0; line-height: 1; }

</style>
</head>
<body>
<div id="topnav-mount" data-nav-label="Chat"></div>

<div class="chat-root">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="chat-sidebar">
        <div class="sidebar-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chat
            <button onclick="showCreateGroupModal()" title="Create group" style="margin-left:auto;background:none;border:1px solid var(--c-border);border-radius:7px;color:var(--c-text-2);cursor:pointer;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px;transition:background .15s;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Group
            </button>
        </div>
        <div class="sidebar-search">
            <input type="search" id="sidebar-search" placeholder="Search conversations…" oninput="filterSidebar(this.value)">
        </div>
        <div class="sidebar-list" id="sidebar-list">
            <div class="sidebar-section-label">Loading…</div>
        </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────────────────── -->
    <div class="chat-main" id="chat-main">
        <div class="chat-empty" id="chat-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Select a conversation to start chatting</p>
        </div>
    </div>

</div>

    <!-- Create Group Modal -->
<div id="create-group-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.5);align-items:center;justify-content:center;backdrop-filter:blur(3px);" onclick="if(event.target===this)closeCreateGroupModal()">
    <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:16px;width:420px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);">
        <div style="padding:18px 20px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;">
            <h3 style="font-size:15px;font-weight:600;color:var(--c-text);margin:0;">Create Group Chat</h3>
            <button onclick="closeCreateGroupModal()" style="background:none;border:none;cursor:pointer;color:var(--c-text-3);font-size:20px;line-height:1;">✕</button>
        </div>
        <div style="padding:20px;overflow-y:auto;flex:1;">
            <div style="margin-bottom:16px;">
                <label style="font-size:12px;font-weight:600;color:var(--c-text-2);display:block;margin-bottom:6px;">Group Name</label>
                <input id="group-name-input" class="form-control" placeholder="e.g. Sales Team, Dispatchers…" style="width:100%;">
            </div>
            <div>
                <label style="font-size:12px;font-weight:600;color:var(--c-text-2);display:block;margin-bottom:6px;">Add Members</label>
                <input id="group-member-search" class="form-control" placeholder="Search people…" oninput="filterGroupMembers(this.value)" style="width:100%;margin-bottom:10px;">
                <div id="group-selected-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:24px;"></div>
                <div id="group-member-list" style="display:flex;flex-direction:column;gap:2px;"></div>
            </div>
        </div>
        <div style="padding:14px 20px;border-top:1px solid var(--c-border);display:flex;gap:10px;justify-content:flex-end;">
            <button class="btn btn-ghost" onclick="closeCreateGroupModal()">Cancel</button>
            <button class="btn btn-primary" onclick="createGroup()" id="create-group-btn">Create Group</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.csv,.txt" multiple onchange="onFileSelect(this.files)">

<script src="app.js"></script>
<script src="chat-popup.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allConversations  = [];
    let myWritePerms = {};
let allProfiles       = [];
let activeConvId      = null;
let messageChannel    = null;
let pendingFiles      = [];
let typingTimer       = null;
let onlineUsers       = new Set();
let unreadCounts      = {};

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await loadNav();
    const profile = await checkAuth();
    if (!profile) return;
    currentProfile = profile;

    document.getElementById('nav-name').textContent = profile.full_name;
    const rm = ROLE_META[profile.role] || { label: profile.role, color: '#6b7280' };
    const rp = document.getElementById('nav-role-pill');
    if (rp) { rp.textContent = rm.label; rp.style.cssText = `background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;`; }
    if (profile.role === 'super_admin') { const a = document.getElementById('dropdown-admin-link'); if (a) a.style.display = 'flex'; }

    await initTheme(profile.id);  // ← ADD THIS LINE

    await Promise.all([loadProfiles(), loadConversations()]);
    renderSidebar();
    subscribePresence();

    // Auto-open first conversation
    if (allConversations.length) openConversation(allConversations[0].id);
});

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadProfiles() {
    const { data } = await sb.from('profiles').select('id,full_name,role,avatar_url,is_active').eq('is_active', true);
    allProfiles = data || [];
}

async function loadConversations() {
    // Get all conversations this user is part of
    const { data: convs } = await sb
        .from('conversations')
.select(`id, type, name, is_readonly, created_at,
    conversation_participants(user_id,last_read_at)`)
        .order('created_at', { ascending: false });

    if (!convs) return;

    // For DMs, figure out the other person
    allConversations = convs.map(c => {
        if (c.type === 'group') return { ...c, displayName: c.name || 'General', isGroup: true };
        const otherUserId = c.conversation_participants?.find(p => p.user_id !== currentUser.id)?.user_id;
        const otherUser   = allProfiles.find(p => p.id === otherUserId);
        return { ...c, displayName: otherUser?.full_name || 'DM', otherUser, isGroup: false };
    });

    // Sort: group first, then DMs alphabetically
    allConversations.sort((a, b) => {
        if (a.isGroup && !b.isGroup) return -1;
        if (!a.isGroup && b.isGroup) return 1;
        return a.displayName.localeCompare(b.displayName);
    });

    // Load last message + unread for each
    await Promise.all(allConversations.map(loadConvMeta));
    // Load this user's write permissions per conversation
    const { data: myParts } = await sb
        .from('conversation_participants')
        .select('conversation_id, can_write')
        .eq('user_id', currentUser.id);
    (myParts || []).forEach(p => { myWritePerms[p.conversation_id] = p.can_write !== false; });
}

async function loadConvMeta(conv) {
    const [{ data: lastMsgs }, { count }] = await Promise.all([
        sb.from('messages')
            .select('content,file_name,file_type,sender_id,created_at')
            .eq('conversation_id', conv.id)
            .order('created_at', { ascending: false })
            .limit(1),
        sb.from('messages')
            .select('id', { count: 'exact', head: true })
            .eq('conversation_id', conv.id)
            .gt('created_at', conv.conversation_participants?.find(p => p.user_id === currentUser.id)?.last_read_at || '1970-01-01')
            .neq('sender_id', currentUser.id)
    ]);
    conv.lastMessage = lastMsgs?.[0] || null;
    conv.unread      = count || 0;
    unreadCounts[conv.id] = conv.unread;
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(filter = '') {
    const list = document.getElementById('sidebar-list');
    const filtered = allConversations.filter(c =>
        c.displayName.toLowerCase().includes(filter.toLowerCase())
    );

    const groups = filtered.filter(c => c.isGroup);
    const dms    = filtered.filter(c => !c.isGroup);

    let html = '';

    if (groups.length) {
        html += `<div class="sidebar-section-label">Channels</div>`;
        html += groups.map(c => convItem(c)).join('');
    }

    // Always show DM section with + New Message button
    html += `<div class="sidebar-section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:10px;">
        Direct Messages
        <button onclick="showNewDMPicker()" style="background:none;border:none;color:var(--c-accent);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;" title="New direct message">+</button>
    </div>`;

    if (dms.length) {
        html += dms.map(c => convItem(c)).join('');
    } else if (!filter) {
        html += `<div style="padding:10px 14px 6px;font-size:12px;color:var(--c-text-3);">No direct messages yet.<br>Click <b>+</b> above to message someone.</div>`;
    }

    if (!groups.length && !dms.length && filter) {
        html = `<div style="padding:20px;font-size:13px;color:var(--c-text-3);text-align:center;">No results</div>`;
    }

    list.innerHTML = html;
    updateNavBadge();
}

function convItem(c) {
    const isActive  = c.id === activeConvId;
    const isOnline  = c.otherUser && onlineUsers.has(c.otherUser.id);
    const initials  = getInitials(c.displayName);
    const preview   = c.lastMessage
        ? (c.lastMessage.file_name ? `📎 ${c.lastMessage.file_name}` : c.lastMessage.content || '')
        : 'No messages yet';
    const unread    = c.unread || 0;

    return `<div class="conv-item ${isActive ? 'active' : ''}" onclick="openConversation('${c.id}')">
        <div class="conv-avatar" style="${c.isGroup ? 'background:var(--c-accent-g);color:var(--c-accent);' : ''}">
${c.isGroup
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
                : `${c.otherUser?.avatar_url ? `<img src="${escHtml(c.otherUser.avatar_url)}">` : initials}${isOnline ? '<div class="online-dot"></div>' : ''}`
            }
        </div>
        <div class="conv-info">
            <div class="conv-name">${escHtml(c.displayName)}</div>
            <div class="conv-preview">${escHtml(preview.slice(0, 45))}</div>
        </div>
        ${unread > 0 ? `<span class="unread-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
    </div>`;
}

function filterSidebar(val) { renderSidebar(val); }

// ─── OPEN CONVERSATION ────────────────────────────────────────────────────────
async function openConversation(convId) {
    activeConvId = convId;
    pendingFiles = [];

    // Update sidebar active state
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const activeEl = document.querySelector(`.conv-item[onclick="openConversation('${convId}')"]`);
    if (activeEl) activeEl.classList.add('active');

    // Mark as read
    await sb.from('conversation_participants')
        .update({ last_read_at: new Date().toISOString() })
        .eq('conversation_id', convId)
        .eq('user_id', currentUser.id);

    const conv = allConversations.find(c => c.id === convId);
    conv.unread = 0;
    unreadCounts[convId] = 0;
    updateNavBadge();

    // Build main area
    const main = document.getElementById('chat-main');
    main.innerHTML = `
        <div class="chat-topbar">
            <div class="chat-topbar-avatar" id="topbar-avatar">${getInitials(conv.displayName)}</div>
            <div class="chat-topbar-info">
                <div class="chat-topbar-name">${escHtml(conv.displayName)}</div>
                <div class="chat-topbar-sub" id="topbar-sub">${conv.isGroup ? 'Group chat' : ''}</div>
            </div>
<button class="call-topbar-btn" id="call-btn" onclick="initiateCall()" title="${conv.isGroup ? 'Start group call' : 'Audio call'}">
                <svg width="15" height="15" ...>...</svg>
                ${conv.isGroup ? 'Group Call' : 'Audio Call'}
            </button>
            ${conv.isGroup ? `
<button class="call-topbar-btn" onclick="openGroupSettings('${conv.id}')" title="Group settings" style="margin-left:4px;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                Settings
            </button>` : ''}
        </div>
${conv.isGroup && (conv.displayName || '').toLowerCase() !== 'general' && currentProfile?.role === 'super_admin' ? `
            <button class="call-topbar-btn" onclick="confirmDeleteGroup('${conv.id}')" title="Delete group"
                style="color:#ef4444;border-color:#ef444433;margin-left:4px;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                Delete Group
            </button>` : ''}
        </div>
        <div class="messages-wrap" id="messages-wrap">
            <div style="text-align:center;padding:30px;color:var(--c-text-3);font-size:13px;">Loading messages…</div>
        </div>
        <div class="chat-input-area">
            <div class="upload-preview-strip" id="upload-preview"></div>
            <div class="input-row">
                <button class="input-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="msg-input" placeholder="Type a message…" rows="1"
                    onkeydown="onInputKeydown(event)"
                    oninput="autoGrow(this);onTyping()"></textarea>
                <button class="input-btn send" id="send-btn" onclick="sendMessage()" title="Send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>`;

    // Style the topbar avatar
    const topbarAv = document.getElementById('topbar-avatar');
    if (conv.isGroup) {
        topbarAv.style.cssText = 'background:var(--c-accent-g);color:var(--c-accent);font-size:14px;';
        topbarAv.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
    } else if (conv.otherUser?.avatar_url) {
        topbarAv.innerHTML = `<img src="${conv.otherUser.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    }

    if (!conv.isGroup) {
        const sub = document.getElementById('topbar-sub');
        const rm  = ROLE_META[conv.otherUser?.role] || { label: conv.otherUser?.role || '', color: '#6b7280' };
        sub.innerHTML = `<span class="role-pill-sm" style="background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;">${rm.label}</span>`;
    }

    await loadMessages(convId);
    subscribeMessages(convId);
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
async function loadMessages(convId) {
    const { data: msgs } = await sb
        .from('messages')
        .select('id,content,file_url,file_name,file_type,sender_id,created_at')
        .eq('conversation_id', convId)
        .order('created_at', { ascending: true })
        .limit(200);

    renderMessages(msgs || []);
}

function renderMessages(msgs) {
    const wrap = document.getElementById('messages-wrap');
    if (!wrap) return;

    if (!msgs.length) {
        wrap.innerHTML = `<div style="text-align:center;padding:40px;color:var(--c-text-3);font-size:13px;">No messages yet. Say hello! 👋</div>`;
        return;
    }

    let html   = '';
    let lastDay = '';
    let lastSender = null;
    let lastTime   = null;

    msgs.forEach((msg, idx) => {
        const date     = new Date(msg.created_at);
        const dayStr   = date.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
        const timeStr  = date.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
        const isMe     = msg.sender_id === currentUser.id;
        const sender   = allProfiles.find(p => p.id === msg.sender_id);
        const gap      = lastTime && (date - lastTime) > 5 * 60 * 1000;
        const isCont   = !gap && lastSender === msg.sender_id;
        const conv     = allConversations.find(c => c.id === activeConvId);

        if (dayStr !== lastDay) {
            html += `<div class="day-divider">${dayStr}</div>`;
            lastDay = dayStr;
        }

        const initials = getInitials(sender?.full_name || '?');
        const rm       = ROLE_META[sender?.role] || { label: sender?.role || '', color: '#6b7280' };

        html += `<div class="msg-row ${isMe ? 'mine' : ''} ${isCont ? 'continuation' : ''}" data-id="${msg.id}" oncontextmenu="showCtxMenu(event,'${msg.id}',${isMe})">
            <div class="msg-avatar">${sender?.avatar_url ? `<img src="${sender.avatar_url}">` : initials}</div>
            <div class="msg-content">
                ${!isCont && !isMe && conv?.isGroup ? `<div class="msg-sender">
                    ${escHtml(sender?.full_name || 'Unknown')}
                    <span class="role-pill-sm" style="background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;">${rm.label}</span>
                </div>` : ''}
                <div style="display:flex;align-items:flex-end;gap:4px;${isMe ? 'flex-direction:row-reverse;' : ''}">
                    <div class="bubble">${msg.deleted ? '<span class="msg-deleted"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Message deleted</span>' : renderBubbleContent(msg)}</div>
                    <span class="bubble-time">${timeStr}</span>
                </div>
            </div>
        </div>`;

        lastSender = msg.sender_id;
        lastTime   = date;
    });

    wrap.innerHTML = html;
    wrap.scrollTop = wrap.scrollHeight;
}

function renderBubbleContent(msg) {
    if (msg.file_url && msg.file_type?.startsWith('image/')) {
        return `<img class="bubble-img" src="${escHtml(msg.file_url)}" alt="${escHtml(msg.file_name || 'image')}" onclick="openLightbox('${escHtml(msg.file_url)}')">
                ${msg.content ? `<div style="margin-top:6px;">${escHtml(msg.content)}</div>` : ''}`;
    }
    if (msg.file_url) {
        return `<a class="bubble-file" href="${escHtml(msg.file_url)}" target="_blank" download="${escHtml(msg.file_name || 'file')}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div><div class="bubble-file-name">${escHtml(msg.file_name || 'File')}</div></div>
        </a>
        ${msg.content ? `<div style="margin-top:6px;">${escHtml(msg.content)}</div>` : ''}`;
    }
    return escHtml(msg.content || '');
}

// ─── REALTIME ─────────────────────────────────────────────────────────────────
function subscribeMessages(convId) {
    if (messageChannel) sb.removeChannel(messageChannel);

    messageChannel = sb.channel('messages:' + convId)
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'messages',
            filter: `conversation_id=eq.${convId}`
        }, async (payload) => {
            const msg    = payload.new;
            const sender = allProfiles.find(p => p.id === msg.sender_id);
            if (!sender) await loadProfiles();
            appendMessage(msg);

            // Play notification if message is from someone else
            if (msg.sender_id !== currentUser.id) playNotification();

            // Mark read immediately since we're looking at this convo
            await sb.from('conversation_participants')
                .update({ last_read_at: new Date().toISOString() })
                .eq('conversation_id', convId)
                .eq('user_id', currentUser.id);

            // Update sidebar preview
            const conv = allConversations.find(c => c.id === convId);
            if (conv) { conv.lastMessage = msg; renderSidebar(document.getElementById('sidebar-search').value); }
        })
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'messages',
            filter: `conversation_id=eq.${convId}`
        }, (payload) => {
            // Handle soft-delete (deleted flag set to true)
            if (payload.new.deleted) {
                const row = document.querySelector(`.msg-row[data-id="${payload.new.id}"]`);
                if (row) {
                    const bubble = row.querySelector('.bubble');
                    if (bubble) bubble.innerHTML = '<span class="msg-deleted"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Message deleted</span>';
                }
            }
        })
        .subscribe();
}

function appendMessage(msg) {
    const wrap = document.getElementById('messages-wrap');
    if (!wrap) return;

    // Remove the "no messages" placeholder if present
    const placeholder = wrap.querySelector('div[style*="text-align:center"]');
    if (placeholder) placeholder.remove();

    const isMe     = msg.sender_id === currentUser.id;
    const sender   = allProfiles.find(p => p.id === msg.sender_id);
    const date     = new Date(msg.created_at);
    const timeStr  = date.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    const initials = getInitials(sender?.full_name || '?');
    const rm       = ROLE_META[sender?.role] || { label: sender?.role || '', color: '#6b7280' };
    const conv     = allConversations.find(c => c.id === activeConvId);

    const div = document.createElement('div');
    div.className = `msg-row ${isMe ? 'mine' : ''}`;
    div.dataset.id = msg.id;
    div.setAttribute('oncontextmenu', `showCtxMenu(event,'${msg.id}',${isMe})`);
    div.innerHTML = `
        <div class="msg-avatar">${sender?.avatar_url ? `<img src="${sender.avatar_url}">` : initials}</div>
        <div class="msg-content">
            ${!isMe && conv?.isGroup ? `<div class="msg-sender">
                ${escHtml(sender?.full_name || 'Unknown')}
                <span class="role-pill-sm" style="background:${rm.color}22;color:${rm.color};border:1px solid ${rm.color}44;">${rm.label}</span>
            </div>` : ''}
            <div style="display:flex;align-items:flex-end;gap:4px;${isMe ? 'flex-direction:row-reverse;' : ''}">
                <div class="bubble">${renderBubbleContent(msg)}</div>
                <span class="bubble-time">${timeStr}</span>
            </div>
        </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
}

// ─── PRESENCE ─────────────────────────────────────────────────────────────────
function subscribePresence() {
    const presenceChannel = sb.channel('presence')
        .on('presence', { event: 'sync' }, () => {
            const state = presenceChannel.presenceState();
            onlineUsers = new Set(Object.values(state).flat().map(p => p.user_id));
            renderSidebar(document.getElementById('sidebar-search').value);
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await presenceChannel.track({ user_id: currentUser.id });
            }
        });
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
        const conv = allConversations.find(c => c.id === activeConvId);

// Block if group is read-only (whole group) or user has no write permission
    if (conv?.isGroup && currentProfile?.role !== 'super_admin') {
        if (conv?.is_readonly) {
            showToast('This group is read-only. Only admins can send messages.', 'error');
            return;
        }
        if (myWritePerms[activeConvId] === false) {
            showToast('You don\'t have permission to send messages in this group.', 'error');
            return;
        }
    }
    if (!activeConvId) return;
    const input   = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content && !pendingFiles.length) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;

    try {
        if (pendingFiles.length) {
            for (const f of pendingFiles) {
                const path = `${activeConvId}/${Date.now()}-${f.file.name}`;
                const { error: upErr } = await sb.storage.from('chat-files').upload(path, f.file);
                if (upErr) { showToast('Upload failed: ' + f.file.name, 'error'); continue; }
                const { data: { publicUrl } } = sb.storage.from('chat-files').getPublicUrl(path);

                await sb.from('messages').insert({
                    conversation_id: activeConvId,
                    sender_id: currentUser.id,
                    content: f === pendingFiles[pendingFiles.length - 1] ? content : '',
                    file_url: publicUrl,
                    file_name: f.file.name,
                    file_type: f.file.type
                });
            }
            pendingFiles = [];
            document.getElementById('upload-preview').innerHTML = '';
        } else {
            await sb.from('messages').insert({
                conversation_id: activeConvId,
                sender_id: currentUser.id,
                content
            });
        }
        input.value = '';
        input.style.height = '';
    } catch (err) {
        showToast('Failed to send: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        input.focus();
    }
}

function onInputKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onTyping() { /* typing indicator hook — future enhancement */ }

// ─── FILE HANDLING ────────────────────────────────────────────────────────────
function onFileSelect(files) {
    Array.from(files).forEach(file => {
        if (file.size > 20 * 1024 * 1024) { showToast(`${file.name} exceeds 20MB`, 'error'); return; }
        pendingFiles.push({ file, previewUrl: file.type.startsWith('image/') ? URL.createObjectURL(file) : null });
    });
    renderUploadPreview();
    document.getElementById('file-input').value = '';
}

function renderUploadPreview() {
    const strip = document.getElementById('upload-preview');
    if (!strip) return;
    strip.innerHTML = pendingFiles.map((f, i) => `
        <div class="upload-thumb">
            ${f.previewUrl
                ? `<img src="${f.previewUrl}" alt="${escHtml(f.file.name)}">`

async function openOrCreateDM(otherUserId) {
    // Check if DM already exists
    const existing = allConversations.find(c =>
        !c.isGroup &&
        c.conversation_participants?.some(p => p.user_id === otherUserId)
    );
    if (existing) { openConversation(existing.id); return; }

    // Create new DM
    const { data: conv } = await sb.from('conversations').insert({ type: 'dm' }).select().single();
    if (!conv) { showToast('Could not create conversation', 'error'); return; }

    await sb.from('conversation_participants').insert([
        { conversation_id: conv.id, user_id: currentUser.id },
        { conversation_id: conv.id, user_id: otherUserId }
    ]);

    await loadConversations();
    renderSidebar();
    openConversation(conv.id);
}

function getInitials(name) {
    if (!name) return '?';
    const parts = name.trim().split(' ');
    return (parts.length >= 2 ? parts[0][0] + parts[parts.length - 1][0] : parts[0].slice(0, 2)).toUpperCase();
}

function openLightbox(url) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `<img src="${escHtml(url)}" alt="Image preview">`;
    lb.onclick = () => lb.remove();
    document.body.appendChild(lb);
}

function updateNavBadge() {
    const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
    const badge = document.getElementById('chat-nav-badge');
    if (badge) { badge.textContent = total > 99 ? '99+' : total; badge.style.display = total ? '' : 'none'; }
}

// Tiny inline notification sound generated via Web Audio API — no file needed
function playNotification() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
    } catch(e) { /* audio not available */ }
}

async function deleteMessage(msgId) {

        .update({ deleted: true, content: null, file_url: null, file_name: null, file_type: null })
        .eq('id', msgId)

        const el = document.getElementById('call-timer');
        if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;

    const btn = document.getElementById('create-group-btn');

    try {
        const { data: conv, error: convErr } = await sb.from('conversations').insert({ type: 'group', name }).select().single();
        if (convErr || !conv) throw new Error(convErr?.message || 'Failed to create group');
        const parts = [
            { conversation_id: conv.id, user_id: currentUser.id },
            ...[..._groupSelectedIds].map(uid => ({ conversation_id: conv.id, user_id: uid }))

        const { error: pErr } = await sb.from('conversation_participants').insert(parts);

        showToast('Group "' + name + '" created!', 'success');

        renderSidebar();
        openConversation(conv.id);

        showToast('Error: ' + err.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Create Group';
    }

    <div style="font-size:12px;color:var(--c-text-3);margin-bottom:16px;">${members.length} members</div>

    ${isAdmin ? `
    <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--c-border);">
            <div style="width:32px;height:32px;background:rgba(239,68,68,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div style="flex:1;">
                <div style="font-size:13px;font-weight:500;color:var(--c-text);">Read-only mode</div>
                <div style="font-size:11px;color:var(--c-text-3);margin-top:1px;">Only admins can send messages</div>
            </div>
            <span id="gs-readonly-badge" style="font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;background:${currentReadonly ? 'rgba(16,185,129,.12)' : 'var(--c-raised)'};color:${currentReadonly ? '#10b981' : 'var(--c-text-3)'};">${currentReadonly ? 'On' : 'Off'}</span>
            <label style="position:relative;width:38px;height:21px;flex-shrink:0;cursor:pointer;">
                <input type="checkbox" ${currentReadonly ? 'checked' : ''} style="opacity:0;width:0;height:0;position:absolute;" onchange="toggleGroupReadonly('${convId}',this.checked)">
                <div id="gs-track" style="position:absolute;inset:0;border-radius:11px;background:${currentReadonly ? 'var(--c-accent)' : 'var(--c-border-l)'};transition:background .2s;"></div>
                <div id="gs-thumb" style="position:absolute;top:2.5px;left:${currentReadonly ? '19' : '2.5'}px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></div>
            </label>
        </div>
    </div>` : ''}

    <div style="font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-text-3);margin-bottom:6px;">Members</div>
    <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;margin-bottom:14px;">
        ${membersHTML}
    </div>

    ${deleteBtn}
    <div style="height:8px;"></div>
    `;

    // Inject into a slide-in panel
    let panel = document.getElementById('group-settings-panel');
    if (!panel) {
        panel = document.createElement('div');
        panel.id = 'group-settings-panel';
        panel.style.cssText = 'position:fixed;top:0;right:-380px;width:360px;height:100vh;background:var(--c-surface);border-left:1px solid var(--c-border);z-index:7000;display:flex;flex-direction:column;transition:right .25s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 24px rgba(0,0,0,.08);';
        panel.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--c-border);flex-shrink:0;">
                <button onclick="closeGroupSettings()" style="background:none;border:1px solid var(--c-border);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--c-text-2);cursor:pointer;display:flex;align-items:center;gap:4px;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                </button>
                <span style="font-size:13px;font-weight:600;color:var(--c-text);">Group Settings</span>
            </div>
            <div id="group-settings-body" style="flex:1;overflow-y:auto;padding:16px;"></div>`;
        document.body.appendChild(panel);
    }

    document.getElementById('group-settings-body').innerHTML = html;
    // Animate in
    requestAnimationFrame(() => { panel.style.right = '0'; });
}

window.closeGroupSettings = function() {
    const panel = document.getElementById('group-settings-panel');
    if (panel) panel.style.right = '-380px';
};

window.toggleGroupReadonly = async function(convId, isReadonly) {
    const track = document.getElementById('gs-track');
    const thumb = document.getElementById('gs-thumb');
    const badge = document.getElementById('gs-readonly-badge');
    if (track) track.style.background = isReadonly ? 'var(--c-accent)' : 'var(--c-border-l)';
    if (thumb) thumb.style.left = isReadonly ? '19px' : '2.5px';
    if (badge) {
        badge.textContent = isReadonly ? 'On' : 'Off';
        badge.style.background = isReadonly ? 'rgba(16,185,129,.12)' : 'var(--c-raised)';
        badge.style.color = isReadonly ? '#10b981' : 'var(--c-text-3)';
    }
    const { error } = await sb.from('conversations').update({ is_readonly: isReadonly }).eq('id', convId);
    if (error) { showToast('Failed to update: ' + error.message, 'error'); return; }
    const conv = allConversations.find(c => c.id === convId);
    if (conv) conv.is_readonly = isReadonly;
    // When enabling read-only: set all non-admin members to can_write = false
    // When disabling: restore can_write = true for all (admin can then restrict individually)
    if (isReadonly) {
        const nonAdminIds = allProfiles
            .filter(p => p.role !== 'super_admin' && conv?.conversation_participants?.some(cp => cp.user_id === p.id))
            .map(p => p.id);
        if (nonAdminIds.length) {
            await sb.from('conversation_participants')
                .update({ can_write: false })
                .eq('conversation_id', convId)
                .in('user_id', nonAdminIds);
            nonAdminIds.forEach(id => { myWritePerms[convId] = id === currentUser.id ? false : myWritePerms[convId]; });
        }
    } else {
        await sb.from('conversation_participants')
            .update({ can_write: true })
            .eq('conversation_id', convId);
        myWritePerms[convId] = true;
    }
    showToast(isReadonly ? 'Read-only mode on' : 'Members can write again', 'success');
};

window.toggleMemberWrite = async function(convId, userId, newCanWrite, btn) {
    const { error } = await sb.from('conversation_participants')
        .update({ can_write: newCanWrite })
        .eq('conversation_id', convId).eq('user_id', userId);
    if (error) { showToast('Failed: ' + error.message, 'error'); return; }
if (btn) {
        btn.textContent = newCanWrite ? '✏️ Can write' : '👁 Read only';
        btn.style.color = newCanWrite ? 'var(--c-success,#10b981)' : 'var(--c-text-3)';
        btn.setAttribute('onclick', `toggleMemberWrite('${convId}','${userId}',${!newCanWrite},this)`);
        btn.title = newCanWrite ? 'Can write — click to restrict' : 'Read-only — click to allow';
    }
    // Keep local permission map in sync
    myWritePerms[convId] = newCanWrite;
    // Live-update input if this is the active conv and it's the current user
    if (convId === activeConvId && userId === currentUser.id) {
        const input   = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        if (input)   { input.disabled = !newCanWrite; input.placeholder = newCanWrite ? 'Type a message…' : '🔒 You can\'t send messages here.'; input.style.opacity = newCanWrite ? '1' : '.5'; }
        if (sendBtn) { sendBtn.disabled = !newCanWrite; sendBtn.style.opacity = newCanWrite ? '1' : '.3'; }
    }
    showToast(newCanWrite ? 'Member can now write' : 'Member set to read-only', 'success');
    showToast(newCanWrite ? 'Member can now write' : 'Member set to read-only', 'success');
};
</script>
